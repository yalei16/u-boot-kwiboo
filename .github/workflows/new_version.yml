name: Build U-Boot for K20 Pro Dual Boot

on:
  workflow_dispatch:
    inputs:
      uboot_repo:
        description: 'U-Boot仓库地址'
        required: true
        default: 'https://github.com/Aospa-raphael-unofficial/u-boot.git'
      uboot_branch:
        description: 'U-Boot分支'
        required: true
        default: 'main'
      defconfig:
        description: 'defconfig名称'
        required: true
        default: 'raphael_defconfig'

env:
  CROSS_COMPILE: aarch64-linux-gnu-
  ARCH: arm64

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 下载U-Boot源码
      uses: actions/checkout@v4
      with:
        repository: Aospa-raphael-unofficial/u-boot
        ref: ${{ github.event.inputs.uboot_branch }}
        path: u-boot
        submodules:false
    - name: 安装编译工具
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc-aarch64-linux-gnu bison flex \
          libssl-dev device-tree-compiler \
          swig python3-dev python3-setuptools \
          bc make git u-boot-tools
        
    - name: 查看可用的defconfig
      working-directory: u-boot
      run: |
        echo "=== 查找raphael相关配置 ==="
        ls configs/ | grep -i raphael || true
        ls configs/ | grep -i sm8150 || true
        echo "=== 前20个ARM64配置 ==="
        ls configs/*_defconfig 2>/dev/null | head -20 || true
          
    - name: 配置U-Boot
      working-directory: u-boot
      run: |
        DEFCONFIG="${{ github.event.inputs.defconfig }}"
        
        if [ -f "configs/${DEFCONFIG}" ]; then
          make ${DEFCONFIG}
        elif [ -f "configs/raphael_defconfig" ]; then
          make raphael_defconfig
        elif [ -f "configs/sm8150_defconfig" ]; then
          make sm8150_defconfig
        else
          echo "使用通用ARM64配置"
          make qemu_arm64_defconfig
        fi
        
        echo 'CONFIG_CMD_BOOTMENU=y' >> .config
        echo 'CONFIG_MENU=y' >> .config
        echo 'CONFIG_MENU_SHOW=y' >> .config
        echo 'CONFIG_CMD_EXT4=y' >> .config
        echo 'CONFIG_FS_EXT4=y' >> .config
        echo 'CONFIG_DISTRO_DEFAULTS=y' >> .config
        make olddefconfig
        
    - name: 编译U-Boot
      working-directory: u-boot
      run: make -j$(nproc)
        
    - name: 生成双系统菜单配置
      run: |
        mkdir -p release/extlinux
        cat > release/extlinux/extlinux.conf << 'EOF'
MENU TITLE K20 Pro Boot Menu
TIMEOUT 50
DEFAULT ubuntu

LABEL ubuntu
  MENU LABEL ^1. Ubuntu (sda31)
  LINUX /boot/vmlinuz
  FDT /boot/dtb/sm8150-xiaomi-raphael.dtb
  INITRD /boot/initrd.img
  APPEND console=ttyMSM0,115200n8 root=/dev/sda31 rw rootwait

LABEL kali
  MENU LABEL ^2. Kali Linux (sda32)
  LINUX /boot/vmlinuz
  FDT /boot/dtb/sm8150-xiaomi-raphael.dtb
  INITRD /boot/initrd.img
  APPEND console=ttyMSM0,115200n8 root=/dev/sda32 rw rootwait

LABEL recovery
  MENU LABEL ^3. Recovery Mode
  LINUX /boot/vmlinuz
  FDT /boot/dtb/sm8150-xiaomi-raphael.dtb
  INITRD /boot/initrd.img
  APPEND console=ttyMSM0,115200n8 root=/dev/sda31 rw single
EOF
        
    - name: 复制编译产物
      run: |
        cp u-boot/u-boot.bin release/ 2>/dev/null || true
        cp u-boot/u-boot-nodtb.bin release/ 2>/dev/null || true
        cp u-boot/u-boot.dtb release/ 2>/dev/null || true
        cp u-boot/spl/u-boot-spl.bin release/ 2>/dev/null || true
        ls -la release/
        
    - name: 上传构建结果
      uses: actions/upload-artifact@v4
      with:
        name: u-boot-k20pro-dualboot
        path: release/*
